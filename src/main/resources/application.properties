spring.application.name=ProfileManagerSpringBoot

# Database Connection (uses environment variables)
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Multipart upload limits (avatar file uploads)
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB

# Supabase Storage
app.supabase.url=${SUPABASE_URL}
app.supabase.secret-key=${SUPABASE_SECRET_KEY}
app.supabase.avatar-bucket=${SUPABASE_AVATAR_BUCKET:avatars}

# Hibernate connection settings
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.connection.autocommit=false

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Server
server.port=${PORT:8080}
spring.thymeleaf.cache=false